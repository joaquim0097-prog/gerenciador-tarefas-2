<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Tarefas de Funcionários</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        form {
            display: grid;
            gap: 15px;
            max-width: 600px;
            margin-bottom: 30px;
        }
        input, select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #2980b9;
        }
        button.danger {
            background: #e74c3c;
        }
        button.danger:hover {
            background: #c0392b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #34495e;
            color: white;
        }
        .task-item button {
            margin-right: 5px;
            padding: 5px 10px;
            font-size: 14px;
        }
        #loginError {
            color: #e74c3c;
            margin-top: 10px;
        }
        #availableEmployees {
            margin-top: 10px;
            font-weight: bold;
        }
        .logout {
            background: #95a5a6;
            margin-bottom: 20px;
        }
        .logout:hover {
            background: #7f8c8d;
        }
        .section {
            margin-bottom: 40px;
        }
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
            }
            form {
                grid-template-columns: 1fr;
            }
            table {
                font-size: 14px;
            }
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Page -->
        <div id="loginPage">
            <h1>Gerenciamento de Tarefas</h1>
            <p>Faça login com seu nome (Admin ou Funcionário)</p>
            <input type="text" id="loginInput" placeholder="Nome do funcionário" style="width: 300px; max-width: 100%;">
            <br>
            <button onclick="login()" style="margin-top: 20px;">Entrar</button>
            <div id="loginError"></div>
            <div id="availableEmployees"></div>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDash" style="display: none;">
            <button class="logout" onclick="logout()">Sair</button>
            <h1>Dashboard Admin</h1>

            <div class="section">
                <h2>Adicionar Novo Funcionário</h2>
                <input type="text" id="newEmpInput" placeholder="Nome do funcionário">
                <button onclick="addEmployee()">Adicionar Funcionário</button>
            </div>

            <div class="section">
                <h2>Lista de Funcionários</h2>
                <ul id="empList" style="list-style: none;"></ul>
            </div>

            <div class="section">
                <h2>Gerenciar Tarefas</h2>
                <form id="taskForm">
                    <input type="text" id="taskDesc" placeholder="Descrição da tarefa">
                    <input type="date" id="taskDue">
                    <select id="taskResp">
                        <option value="">Selecione funcionário</option>
                    </select>
                    <select id="taskStatus">
                        <option value="pending">Pendente</option>
                        <option value="completed">Concluída</option>
                    </select>
                    <button type="button" onclick="saveTask()">Adicionar Tarefa</button>
                </form>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Data Limite</th>
                        <th>Responsável</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="taskTbody"></tbody>
            </table>
        </div>

        <!-- Employee Dashboard -->
        <div id="empDash" style="display: none;">
            <button class="logout" onclick="logout()">Sair</button>
            <h1>Dashboard Funcionário: <span id="userName"></span></h1>
            <div class="section">
                <h2>Suas Tarefas</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Descrição</th>
                            <th>Data Limite</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="myTaskTbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentUser = '';
        let isAdmin = false;
        let editTaskId = null;

        function getEmployees() {
            return JSON.parse(localStorage.getItem('employees') || '[]');
        }

        function saveEmployees(emps) {
            localStorage.setItem('employees', JSON.stringify(emps));
        }

        function getTasks() {
            return JSON.parse(localStorage.getItem('tasks') || '[]');
        }

        function saveTasks(tasks) {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function initData() {
            if (getEmployees().length === 0) {
                let demoEmps = ['João Silva', 'Maria Santos'];
                saveEmployees(demoEmps);
            }
        }

        function login() {
            let name = document.getElementById('loginInput').value.trim();
            let lowerName = name.toLowerCase();
            let errorDiv = document.getElementById('loginError');
            let availDiv = document.getElementById('availableEmployees');
            errorDiv.innerHTML = '';
            availDiv.innerHTML = '';

            if (lowerName === 'admin') {
                currentUser = 'Admin';
                isAdmin = true;
                showAdmin();
                return;
            }

            let emps = getEmployees();
            let lowerEmps = emps.map(e => e.toLowerCase());
            let foundEmp = emps.find(e => e.toLowerCase() === lowerName);
            if (foundEmp) {
                currentUser = foundEmp;
                isAdmin = false;
                showEmp();
                return;
            }

            // Error
            errorDiv.innerHTML = 'Funcionário não existe.';
            if (emps.length > 0) {
                availDiv.innerHTML = '<strong>Funcionários disponíveis:</strong> ' + emps.join(', ');
            } else {
                availDiv.innerHTML = '<strong>Nenhum funcionário cadastrado. Use &quot;Admin&quot; para cadastrar.</strong>';
            }
        }

        function showLogin() {
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('adminDash').style.display = 'none';
            document.getElementById('empDash').style.display = 'none';
        }

        function showAdmin() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminDash').style.display = 'block';
            document.getElementById('empDash').style.display = 'none';
            updateEmpList();
            updateTaskRespSelect();
            updateTaskList();
            editTaskId = null;
            clearTaskForm();
        }

        function showEmp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminDash').style.display = 'none';
            document.getElementById('empDash').style.display = 'block';
            document.getElementById('userName').textContent = currentUser;
            updateMyTaskList();
        }

        function logout() {
            currentUser = '';
            showLogin();
            document.getElementById('loginInput').value = '';
        }

        function addEmployee() {
            let name = document.getElementById('newEmpInput').value.trim();
            if (!name) {
                alert('Nome é obrigatório');
                return;
            }
            let emps = getEmployees();
            if (emps.some(e => e.toLowerCase() === name.toLowerCase())) {
                alert('Funcionário já existe');
                return;
            }
            emps.push(name);
            saveEmployees(emps);
            updateEmpList();
            updateTaskRespSelect();
            document.getElementById('newEmpInput').value = '';
        }

        function updateEmpList() {
            let emps = getEmployees();
            document.getElementById('empList').innerHTML = emps.map(e => `<li>${e}</li>`).join('');
        }

        function updateTaskRespSelect() {
            let emps = getEmployees();
            let sel = document.getElementById('taskResp');
            sel.innerHTML = '<option value="">Selecione funcionário</option>' + emps.map(e => `<option value="${e}">${e}</option>`).join('');
        }

        function clearTaskForm() {
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskDue').value = '';
            document.getElementById('taskResp').value = '';
            document.getElementById('taskStatus').value = 'pending';
            document.querySelector('#taskForm button').textContent = 'Adicionar Tarefa';
        }

        function saveTask() {
            let desc = document.getElementById('taskDesc').value.trim();
            let due = document.getElementById('taskDue').value;
            let resp = document.getElementById('taskResp').value;
            let status = document.getElementById('taskStatus').value;
            if (!desc || !due || !resp) {
                alert('Preencha todos os campos obrigatórios');
                return;
            }
            if (editTaskId !== null) {
                updateTask(editTaskId, desc, due, resp, status);
                editTaskId = null;
                clearTaskForm();
            } else {
                let tasks = getTasks();
                let id = Date.now();
                tasks.push({ id, desc, dueDate: due, responsible: resp, status });
                saveTasks(tasks);
                updateTaskList();
                clearTaskForm();
            }
        }

        function editTask(id) {
            let task = getTasks().find(t => t.id === id);
            if (task) {
                document.getElementById('taskDesc').value = task.desc;
                document.getElementById('taskDue').value = task.dueDate;
                document.getElementById('taskResp').value = task.responsible;
                document.getElementById('taskStatus').value = task.status;
                document.querySelector('#taskForm button').textContent = 'Atualizar Tarefa';
                editTaskId = id;
            }
        }

        function updateTask(id, desc, due, resp, status) {
            let tasks = getTasks();
            let task = tasks.find(t => t.id === id);
            if (task) {
                task.desc = desc;
                task.dueDate = due;
                task.responsible = resp;
                task.status = status;
                saveTasks(tasks);
                updateTaskList();
            }
        }

        function deleteTask(id) {
            if (confirm('Tem certeza que deseja deletar esta tarefa?')) {
                let tasks = getTasks();
                let idx = tasks.findIndex(t => t.id === id);
                if (idx > -1) {
                    tasks.splice(idx, 1);
                    saveTasks(tasks);
                    updateTaskList();
                }
            }
        }

        function updateTaskList() {
            let tasks = getTasks();
            // Sort by due date
            tasks.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            let tbody = document.getElementById('taskTbody');
            tbody.innerHTML = tasks.map(t => `
                <tr>
                    <td>${t.desc}</td>
                    <td>${t.dueDate}</td>
                    <td>${t.responsible}</td>
                    <td>${t.status === 'pending' ? 'Pendente' : 'Concluída'}</td>
                    <td>
                        <button onclick="editTask(${t.id})">Editar</button>
                        <button class="danger" onclick="deleteTask(${t.id})">Deletar</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateMyTaskList() {
            let tasks = getTasks().filter(t => t.responsible.toLowerCase() === currentUser.toLowerCase());
            // Sort by due date
            tasks.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            let tbody = document.getElementById('myTaskTbody');
            tbody.innerHTML = tasks.map(t => `
                <tr>
                    <td>${t.desc}</td>
                    <td>${t.dueDate}</td>
                    <td>${t.status === 'pending' ? `<button onclick="completeTask(${t.id})">Marcar como Concluída</button>` : 'Concluída'}</td>
                </tr>
            `).join('');
        }

        function completeTask(id) {
            let tasks = getTasks();
            let task = tasks.find(t => t.id === id);
            if (task && task.status === 'pending') {
                task.status = 'completed';
                saveTasks(tasks);
                updateMyTaskList();
            }
        }

        // Enter key on login
        document.addEventListener('DOMContentLoaded', function() {
            initData();
            showLogin();
            document.getElementById('loginInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    login();
                }
            });
        });
    </script>
</body>
</html>
